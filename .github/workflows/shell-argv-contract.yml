name: Shell argv contract

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  unix-shells:
    name: Bash / Zsh / Fish on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4.0.0

      - name: Set node version
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install shell deps on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh fish

      - name: Install shell deps on macOS
        if: runner.os == 'macOS'
        run: |
          brew install fish

      - name: Verify Unix shells are available
        run: |
          bash --version
          zsh --version
          fish --version

      - name: Install deps
        run: pnpm install

      - name: Run shell argv contract tests
        run: pnpm test tests/shell-argv-contract.test.ts

  powershell:
    name: PowerShell on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4.0.0

      - name: Set node version
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Verify PowerShell is available
        shell: pwsh
        run: |
          $PSVersionTable.PSVersion
          Get-Command pwsh

      - name: Install deps
        run: pnpm install

      - name: Run shell argv contract tests
        run: pnpm test tests/shell-argv-contract.test.ts